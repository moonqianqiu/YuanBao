name: Build Electron App

on:
  workflow_dispatch: # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解决 Node.js 20 弃用警告

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Electron & Builder Binaries
        uses: actions/cache@v4
        with:
          path: |
            $LOCALAPPDATA\electron\Cache
            $LOCALAPPDATA\electron-builder\Cache
          key: ${{ runner.os }}-electron-binaries-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-binaries-

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          if (!(Test-Path "dist")) {
            Write-Error "构建失败：dist 目录不存在"
            exit 1
          }
          Get-ChildItem -Path "dist" -Recurse

      - name: Create zip of win-unpacked
        run: |
          $zipFile = "YuanBao-Desktop-Win64.zip"
          $source = "dist/win-unpacked"
          
          if (Test-Path $source) {
            Remove-Item $zipFile -Force -ErrorAction SilentlyContinue
            Compress-Archive -Path $source -DestinationPath $zipFile -CompressionLevel Optimal
            Write-Host "Zip created: $zipFile ($(Math::Round((Get-Item $zipFile).Length / 1MB, 2)) MB)"
          } else {
            Write-Error "win-unpacked 文件夹未找到"
            exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YuanBao-Desktop-Win64
          path: YuanBao-Desktop-Win64.zip
          retention-days: 3
          if-no-files-found: error
