name: Build Electron App

on:
  workflow_dispatch: # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解决 Node.js 20 弃用警告

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Electron & Builder Binaries
        uses: actions/cache@v4
        with:
          path: |
            $LOCALAPPDATA\electron\Cache
            $LOCALAPPDATA\electron-builder\Cache
          key: ${{ runner.os }}-electron-binaries-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-binaries-

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          if (!(Test-Path "dist")) {
            Write-Error "构建失败：dist 目录不存在"
            exit 1
          }
          Get-ChildItem -Path "dist" -Recurse

      - name: Create zip of win-unpacked
        run: |
          $ErrorActionPreference = "Stop"
          $workspacePath = $env:GITHUB_WORKSPACE
          $projectRoot = $workspacePath
          $zipFileName = "YuanBao-Desktop-Win64.zip"
          $unpackedFolder = "dist\win-unpacked"
          $tempZipPath = Join-Path $projectRoot $zipFileName

          # 先切换到项目根目录
          Set-Location $projectRoot

          if (Test-Path $unpackedFolder) {
            Write-Host "正在创建 win-unpacked 的 zip 文件..."
            Write-Host "项目根目录: $projectRoot"
            Write-Host "源文件夹: $unpackedFolder"
            Write-Host "输出 zip: $tempZipPath"

            # 先删除已存在的 zip 文件（如果存在）
            if (Test-Path $tempZipPath) {
              Write-Host "删除已存在的 zip 文件..."
              Remove-Item $tempZipPath -Force
            }

            # 使用绝对路径确保正确压缩
            $sourcePath = Join-Path $projectRoot $unpackedFolder
            Compress-Archive -Path $sourcePath -DestinationPath $tempZipPath -CompressionLevel Optimal

            # 验证 zip 文件是否创建成功
            if (Test-Path $tempZipPath) {
              $zipSize = (Get-Item $tempZipPath).Length / 1MB
              Write-Host "Zip 文件创建成功。大小: $([math]::Round($zipSize, 2)) MB"

              # 列出 zip 文件内容的前几个文件，确认不是双层压缩
              Write-Host "验证 zip 文件内容（前 5 个文件）:"
              Get-Item $tempZipPath | Expand-Archive -DestinationPath "$env:TEMP\test_zip" -Force
              Get-ChildItem "$env:TEMP\test_zip" -Recurse | Select-Object -First 5 | ForEach-Object { Write-Host "  - $($_.FullName.Replace("$env:TEMP\test_zip\", ""))" }
              Remove-Item "$env:TEMP\test_zip" -Recurse -Force -ErrorAction SilentlyContinue
            } else {
              Write-Error "Zip 文件未被创建"
              exit 1
            }
          } else {
            Write-Error "win-unpacked 文件夹未找到: $unpackedFolder"
            exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YuanBao-Desktop-Win64
          path: YuanBao-Desktop-Win64.zip
          retention-days: 3
          if-no-files-found: error
